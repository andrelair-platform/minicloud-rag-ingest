name: Build and Push

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging]

env:
  HARBOR_REGISTRY: harbor.devandre.sbs
  IMAGE_NAME: library/rag-ingest
  GITOPS_IMAGE: harbor.10.0.0.200.nip.io/library/rag-ingest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          SHA=$(git rev-parse --short HEAD)
          BRANCH=${GITHUB_REF_NAME}
          if [ "$BRANCH" = "main" ]; then
            TAG="${SHA}-amd64"
          else
            TAG="${BRANCH}-${SHA}-amd64"
          fi
          echo "tag=${TAG}"       >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        if: github.event_name == 'push' && github.ref_name != 'dev'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.event_name == 'push' && github.ref_name != 'dev'
        run: |
          cosign sign --yes \
            ${{ env.HARBOR_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Update image tag in minicloud-gitops (main only)
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          NEW_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/andrelair-platform/minicloud-gitops.git
          cd minicloud-gitops
          git config user.name 'AndreLiar'
          git config user.email 'andrelaurelyvan.kanmegnetabouguie@ynov.com'
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import 2>/dev/null || true
          git config commit.gpgsign true
          git config user.signingkey FD6D39D681DEFA34
          # Match any harbor registry prefix so the pattern works regardless of
          # whether the manifest was last updated by CI (devandre.sbs) or manually (nip.io)
          sed -i "s|harbor\.[^/]*/library/rag-ingest:.*|${GITOPS_IMAGE}:${NEW_TAG}|g" \
            manifests/ai/11-rag-ingest.yaml
          git add manifests/ai/11-rag-ingest.yaml
          git diff --cached --quiet || \
            git commit -S -m "ci(rag-ingest): bump image to ${NEW_TAG}"
          git push
